name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Syntax & import check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax (all .py files)
        run: |
          python -m py_compile agents/base_agent.py
          python -m py_compile agents/supervisor.py
          python -m py_compile core/admin_db.py
          python -m py_compile graphs/multi_agent_graph.py
          python -m py_compile graphs/state.py
          python -m py_compile services/llm_service.py
          python -m py_compile telegram_bot/bot.py
          python -m py_compile telegram_bot/handlers.py
          python -m py_compile utils/config.py
          python -m py_compile utils/logger.py
          python -m py_compile utils/stats.py
          python -m py_compile utils/memory.py
          python -m py_compile utils/agent_loader.py
          python -m py_compile main.py
          echo "✅ All files compile cleanly"

      - name: Verify no secrets in tracked files
        run: |
          if git ls-files | xargs grep -l "BYNARA_API_KEY=.\+" 2>/dev/null | grep -v ".example"; then
            echo "❌ Possible secret found in tracked file"
            exit 1
          fi
          echo "✅ No secrets detected"
